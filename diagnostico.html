<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><title>Diagnóstico ANDA</title>
<style>
body{font-family:monospace;background:#0f1f3d;color:#94a3b8;padding:20px;}
h2{color:white;margin-bottom:15px;}
.ok{color:#4ade80;} .err{color:#f87171;} .info{color:#60a5fa;}
.warn{color:#fbbf24;}
pre{white-space:pre-wrap;font-size:12px;line-height:1.8;}
button{background:#1d4ed8;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin:5px;}
</style></head>
<body>
<h2>🔧 Diagnóstico ANDA Ecossistema</h2>
<button onclick="runAll()">▶ Executar Todos os Testes</button>
<button onclick="document.getElementById('log').textContent=''">Limpar</button>
<pre id="log">Clique em "Executar Todos os Testes"...</pre>
<script>
const W = 'https://anda-neon.rodriguestiago-anda.workers.dev';
function log(msg, cls) {
  document.getElementById('log').innerHTML += '<span class="'+(cls||'info')+'">' + msg + '</span>\n';
}
async function sql(query) {
  const r = await fetch(W, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql:query,params:[]})});
  const d = await r.json();
  return {ok:r.ok, rows:d.rows||[], error:d.error};
}
async function runAll() {
  document.getElementById('log').innerHTML = '';
  
  log('\n=== 1. SESSÃO ===');
  const sess = sessionStorage.getItem('anda_user');
  if (sess) {
    const u = JSON.parse(sess);
    log('✅ Utilizador: ' + u.nome + ' [' + u.role + ']', 'ok');
  } else {
    log('❌ Sem sessão — faça login primeiro', 'err');
  }

  log('\n=== 2. WORKER ===');
  try {
    const r = await fetch(W);
    const d = await r.json();
    log('✅ Worker: ' + JSON.stringify(d), 'ok');
  } catch(e) {
    log('❌ Worker falhou: ' + e.message, 'err');
  }

  log('\n=== 3. COLABORADORES (Neon) ===');
  const c1 = await sql('SELECT COUNT(*) as total FROM colaboradores WHERE activo = true');
  log((c1.ok?'✅':'❌') + ' colaboradores activos: ' + JSON.stringify(c1.rows[0]), c1.ok?'ok':'err');

  log('\n=== 4. PROVA_VIDA (tabela existe?) ===');
  const pv = await sql('SELECT COUNT(*) as total FROM prova_vida');
  if (pv.ok) {
    log('✅ prova_vida existe, registos: ' + JSON.stringify(pv.rows[0]), 'ok');
  } else {
    log('❌ prova_vida erro: ' + pv.error, 'err');
    log('  → Execute neon_prova_vida.sql no Neon!', 'warn');
  }

  log('\n=== 5. COLUNAS PROVA_VIDA ===');
  const cols = await sql("SELECT column_name FROM information_schema.columns WHERE table_name='prova_vida' ORDER BY ordinal_position");
  if (cols.ok) {
    const names = cols.rows.map(r=>r.column_name);
    log('Colunas: ' + names.join(', '), 'ok');
    ['foto_base64','equipamento','equipamento_descricao','sat_1pct','inss_4pct','total_bruto_encargos'].forEach(col => {
      log((names.includes(col)?'  ✅ ':'  ❌ ') + col, names.includes(col)?'ok':'warn');
    });
  }

  log('\n=== 6. APP_USERS ===');
  const u = await sql('SELECT username, role FROM app_users ORDER BY id');
  if (u.ok) {
    u.rows.forEach(r => log('  ✅ ' + r.username + ' [' + r.role + ']', 'ok'));
  } else {
    log('❌ ' + u.error, 'err');
  }

  log('\n=== 7. SAMPLE COLABORADORES ===');
  const s = await sql('SELECT id, nome, distrito FROM colaboradores WHERE activo = true ORDER BY id LIMIT 5');
  if (s.ok && s.rows.length > 0) {
    s.rows.forEach(r => log('  ✅ c_' + r.id + ' · ' + r.nome + ' · ' + r.distrito, 'ok'));
  } else {
    log('❌ Sem colaboradores ou erro: ' + s.error, 'err');
  }

  log('\n=== CONCLUÍDO ===', 'ok');
}
</script>
</body></html>
