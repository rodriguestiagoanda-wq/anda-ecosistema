<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANDA · Recibos de Salário</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:#1e293b;font-size:13px;}
:root{--navy:#0f1f3d;--blue:#1d4ed8;--border:#cbd5e1;}
.topbar{background:linear-gradient(135deg,#0f1f3d,#1e3a8a);padding:10px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.3);}
.topbar img.logo{height:34px;width:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);}
.topbar img.lfdc{height:26px;object-fit:contain;opacity:.85;}
.ttxt h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:white;}
.ttxt span{font-size:10px;color:rgba(255,255,255,.6);}
.tbr{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tbtn{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:5px 11px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;}
.tbtn:hover{background:rgba(255,255,255,.22);}
.toolbar{background:white;border-bottom:1px solid #e2e8f0;padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fsel,.finp{padding:6px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:12px;font-family:inherit;outline:none;background:white;}
.fsel:focus,.finp:focus{border-color:#1d4ed8;}
.main{padding:16px 20px;}
.count-lbl{font-size:12px;color:#64748b;font-weight:600;}

/* ── RECIBO CONTAINER ─────────────────────────────── */
.recibos-grid{display:flex;flex-direction:column;gap:0;}
.page-wrap{background:white;margin-bottom:20px;border-radius:8px;border:1px solid #cbd5e1;box-shadow:0 2px 8px rgba(15,31,61,.06);overflow:hidden;}

/* Each page = 1 A4, contains 2 identical canhões separated by dashed line */
.canhao{padding:10mm 12mm;border-bottom:2px dashed #9ca3af;position:relative;}
.canhao:last-child{border-bottom:none;}

/* ── RECIBO LAYOUT (matching the model) ─────────────── */
.rec-title-area{text-align:center;margin-bottom:6px;}
.rec-title-area h2{font-size:12pt;font-weight:800;color:#0f1f3d;letter-spacing:.5px;}
.rec-title-area .proj{font-size:8pt;color:#475569;margin-top:2px;}

.rec-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--border);margin-bottom:4px;}
.rec-info-grid .cell{padding:4px 7px;border-right:1px solid var(--border);}
.rec-info-grid .cell:last-child{border-right:none;}
.rec-info-grid .cell-lbl{font-size:7pt;font-weight:700;text-transform:uppercase;color:#475569;display:block;}
.rec-info-grid .cell-val{font-size:9pt;font-weight:600;color:#0f1f3d;display:block;min-height:14px;}

.rec-info-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border:1px solid var(--border);border-top:none;margin-bottom:4px;}
.rec-info-4 .cell{padding:4px 7px;border-right:1px solid var(--border);}
.rec-info-4 .cell:last-child{border-right:none;}

.rec-payment-row{display:grid;grid-template-columns:1fr 1fr 2fr 1fr;gap:0;border:1px solid var(--border);border-top:none;margin-bottom:6px;}
.rec-payment-row .cell{padding:4px 7px;border-right:1px solid var(--border);}
.rec-payment-row .cell:last-child{border-right:none;}

/* Abonos/Descontos table */
.rec-tables{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.rec-tbl{border:1px solid var(--border);border-collapse:collapse;width:100%;font-size:8pt;}
.rec-tbl thead th{background:#1e293b;color:white;padding:4px 8px;font-size:7.5pt;font-weight:700;text-align:left;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.rec-tbl thead th:last-child{text-align:right;}
.rec-tbl tbody td{padding:3px 8px;border-bottom:1px solid #f1f5f9;}
.rec-tbl tbody td:last-child{text-align:right;font-weight:600;}
.rec-tbl tfoot td{padding:4px 8px;font-weight:700;background:#f8fafc;border-top:1px solid var(--border);}
.rec-tbl tfoot td:last-child{text-align:right;}

/* TOTAL LÍQUIDO */
.rec-liquido{border:2px solid #0f1f3d;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.rec-liquido .lbl{font-size:9pt;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#0f1f3d;}
.rec-liquido .val{font-size:13pt;font-weight:800;color:#0f1f3d;}

/* INFORMAÇÃO ACUMULADA */
.rec-acum{border:1px solid var(--border);margin-bottom:6px;}
.rec-acum-hdr{background:#0f1f3d;color:white;font-size:8pt;font-weight:700;padding:3px 8px;text-transform:uppercase;letter-spacing:.4px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.rec-acum-body{display:grid;grid-template-columns:1fr 1fr;}
.rec-acum-cell{padding:5px 10px;border-right:1px solid var(--border);}
.rec-acum-cell:last-child{border-right:none;}
.rec-acum-lbl{font-size:7pt;text-transform:uppercase;color:#64748b;font-weight:700;display:block;}
.rec-acum-val{font-size:10pt;font-weight:700;color:#0f1f3d;display:block;}

/* SIGNATURES */
.rec-sigs{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;}
.rec-sig{text-align:center;}
.rec-sig .sig-line{height:36px;border-bottom:1px solid #334155;margin-bottom:4px;}
.rec-sig .sig-lbl{font-size:7.5pt;color:#64748b;text-transform:uppercase;letter-spacing:.3px;}
.rec-sig .sig-name{font-size:8.5pt;font-weight:700;color:#0f1f3d;margin-top:2px;}

/* LOADING */
#loadOv{display:none;position:fixed;inset:0;z-index:9000;background:rgba(255,255,255,.8);backdrop-filter:blur(2px);align-items:center;justify-content:center;gap:12px;}
#loadOv.active{display:flex;}
.spin{width:30px;height:30px;border:3px solid #e2e8f0;border-top-color:#1d4ed8;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
#toasts{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.toast{padding:8px 14px;border-radius:7px;font-size:12px;font-weight:600;color:white;animation:tsl .3s ease;}
.toast.success{background:#10b981;}.toast.error{background:#ef4444;}.toast.info{background:#3b82f6;}.toast.warn{background:#f59e0b;}
@keyframes tsl{from{transform:translateX(50px);opacity:0;}to{transform:none;opacity:1;}}

@media print{
  @page{size:A4 portrait;margin:0;}
  html,body{background:white!important;}
  .topbar,.toolbar,#toasts,#loadOv,.count-lbl{display:none!important;}
  .main{padding:0!important;}
  .recibos-grid{gap:0!important;}
  .page-wrap{
    border:none!important;border-radius:0!important;box-shadow:none!important;
    margin:0!important;page-break-after:always;break-after:page;
    width:210mm;height:297mm;display:flex;flex-direction:column;
  }
  .page-wrap:last-child{page-break-after:auto;break-after:auto;}
  .canhao{
    flex:1;padding:8mm 10mm;
    border-bottom:2px dashed #9ca3af!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .canhao:last-child{border-bottom:none!important;}
  .rec-liquido{border:2px solid #0f1f3d!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .rec-tbl thead th{background:#1e293b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .rec-acum-hdr{background:#0f1f3d!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>

function r2(n){return Math.round((n||0)*100)/100;}
function fmt(n){if(!n&&n!==0)return '—';return Number(n).toLocaleString('pt-MZ',{minimumFractionDigits:2,maximumFractionDigits:2});}
function setLoad(on){document.getElementById('loadOv').classList.toggle('active',on);}
function toast(msg,type){
  const t=document.createElement('div');t.className='toast '+(type||'info');t.textContent=msg;
  document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3500);
}

async function nq(sql,params){
  try{
    const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sql,params:params||[]})});
    if(!r.ok)return null;
    return (await r.json()).rows||[];
  }catch(e){return null;}
}

async function loadData(){
  setLoad(true);
  const mes=parseInt(document.getElementById('selMes').value);
  const ano=parseInt(document.getElementById('selAno').value);
  // Try from folha_salario table
  const rows=await nq('SELECT * FROM folha_salario WHERE mes=$1 AND ano=$2 AND activo=true ORDER BY nr ASC',[mes,ano]);
  if(rows&&rows.length>0){
    folhaColabs=rows.map(r=>(({
      key:r.colab_key,nr:r.nr,nome:r.nome,cargo:r.cargo,grupo:r.grupo,
      distrito:r.distrito,bruto:parseFloat(r.bruto)||0,nib:r.nib||'',banco:r.banco||'BCI',
      dias:r.dias||30,irps:parseFloat(r.irps)||0,deps:r.deps||0,
      nuit:r.nuit||'',inss_nr:r.inss_nr||'',activo:true
    })));
  }else{
    // Fallback to Excel data for January 2026
    folhaColabs=COLABS_JAN2026.map(c=>(({...c,key:'jan_'+c.nr,activo:true})));
  }
  // Load pv data for NIB/bank info
  const pvRows=await nq('SELECT colaborador_id,conta_bancaria,banco,num_inss,nuit FROM prova_vida WHERE activo=true',[]);
  pvData={};
  if(pvRows)pvRows.forEach(r=>{pvData['c_'+r.colaborador_id]=r;});
  setLoad(false);
  renderRecibos();
}

function calcIRPS(bruto,deps){
  const G=18750,ded=bruto-G;
  if(ded<=0)return 0;
  let d=0;
  if(deps===0)d=150;else if(deps===1)d=200;else if(deps===2)d=225;else if(deps===3)d=250;else d=300;
  let irps=0;
  if(ded<=3500)irps=ded*0.10;
  else if(ded<=14000)irps=ded*0.15-175;
  else if(ded<=42000)irps=ded*0.20-875;
  else if(ded<=126000)irps=ded*0.25-2975;
  else irps=ded*0.32-11795;
  return Math.max(0,r2(irps-d));
}

}

function renderRecibos(){
  const mes=parseInt(document.getElementById('selMes').value);
  const ano=parseInt(document.getElementById('selAno').value);
  const distF=document.getElementById('fDist').value;
  const grupoF=document.getElementById('fGrupo').value;
  const depRH=document.getElementById('inpDepRH').value.trim();
  let vis=folhaColabs.filter(c=>c.activo);
  if(distF)vis=vis.filter(c=>c.distrito===distF);
  if(grupoF)vis=vis.filter(c=>c.grupo===grupoF);

  document.getElementById('countLbl').textContent=vis.length+' recibo'+(vis.length!==1?'s':'')+' — '+( MESES[mes]||'13º Mês')+' '+ano;

  if(!vis.length){
    document.getElementById('recibosGrid').innerHTML='<div style="text-align:center;padding:60px;color:#94a3b8;"><div style="font-size:40px;margin-bottom:12px;">🧾</div><p>Nenhum colaborador encontrado.</p></div>';
    return;
  }

  let html='';
  for(let i=0;i<vis.length;i++){
    const c=vis[i];
    const canhao=buildCanhao(c,mes,ano,i+1,depRH);
    // Each A4 page = 2 canhões
    if(i%2===0){
      const c2=vis[i+1];
      const canhao2=c2?buildCanhao(c2,mes,ano,i+2,depRH):'<div class="canhao" style="flex:1;"></div>';
      html+=`<div class="page-wrap">${canhao}${canhao2}</div>`;
      if(c2)i++; // skip next, already included
    }
  }
  document.getElementById('recibosGrid').innerHTML=html;
}

function doLogout(){if(!confirm('Terminar sessão?'))return;sessionStorage.removeItem('anda_user');location.href='index.html';}

window.addEventListener('DOMContentLoaded',function(){
  const saved=sessionStorage.getItem('anda_user');
  if(!saved){location.href='index.html';return;}
  try{
    currentUser=JSON.parse(saved);
    document.getElementById('badgeNome').textContent=currentUser.nome;
    const rl={admin:'Administrador',gestor:'Gestor',viewer:'Visualizador'}[currentUser.role]||currentUser.role;
    document.getElementById('badgeRole').textContent=rl+(currentUser.distrito?' · '+currentUser.distrito:'');
  }catch(e){location.href='index.html';return;}
  const now=new Date();
  document.getElementById('selMes').value=now.getMonth()+1;
  document.getElementById('selAno').value=now.getFullYear();
  loadData();
});
</script>
