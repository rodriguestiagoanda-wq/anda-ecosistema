<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDA Ecossistema</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* --- VARIÁVEIS E RESET --- */
:root {
  --navy:    #0d1b3e; --blue:    #1a3a6c; --azure:   #2563ab; --sky:     #3b82f6;
  --green:   #059669; --emerald: #10b981; --orange:  #ea580c; --amber:   #f59e0b;
  --red:     #dc2626; --purple:  #7c3aed; --teal:    #0891b2; --rose:    #e11d48;
  --white:   #ffffff; --gray50:  #f8fafc; --gray100: #f1f5f9; --gray200: #e2e8f0;
  --gray400: #94a3b8; --gray600: #475569; --gray800: #1e293b;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans', sans-serif; background: var(--gray50); min-height: 100vh; display: flex; flex-direction: column; }

/* --- LOGIN --- */
#loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, var(--navy), var(--azure)); position:fixed; inset:0; z-index:9999; }
.login-card { background:white; border-radius:24px; padding:48px 40px; width:400px; box-shadow:0 32px 80px rgba(0,0,0,0.35); display:flex; flex-direction:column; align-items:center; gap:20px; }
.login-logo { width:100px; height:100px; border-radius:50%; object-fit:cover; }
.login-field { width:100%; display:flex; flex-direction:column; gap:6px; }
.login-field input { width:100%; padding:12px; border:2px solid var(--gray200); border-radius:12px; outline:none; }
.login-btn { width:100%; padding:14px; background:var(--blue); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; }
.login-error { color:var(--red); font-size:12px; font-weight:600; display:none; }

/* --- APP SHELL & DASHBOARD --- */
#appShell { display:none; flex-direction:column; min-height:100vh; }
.topbar { background:var(--navy); color:white; padding:0 32px; height:64px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100; }
.main { flex:1; padding:32px; max-width:1400px; margin:0 auto; width:100%; }
.welcome-banner { background:linear-gradient(135deg, var(--navy), var(--azure)); border-radius:20px; padding:32px; color:white; margin-bottom:32px; display:flex; justify-content:space-between; align-items:center; }
.modules-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:18px; }
.module-card { background:white; border-radius:18px; padding:24px; border:2px solid var(--gray200); cursor:pointer; transition: 0.2s; position:relative; overflow:hidden; }
.module-card:hover { border-color:var(--azure); transform:translateY(-3px); box-shadow:0 12px 30px rgba(0,0,0,0.1); }
.module-card.coming-soon { opacity:0.6; cursor:not-allowed; }

/* --- EFECTIVIDADE UI --- */
.sheet { border-collapse: collapse; width: 100%; background: white; font-size: 11px; }
.sheet th, .sheet td { border: 1px solid var(--gray200); padding: 4px; text-align: center; }
.sheet th { background: var(--blue); color: white; }
.day-cell { cursor: pointer; min-width: 25px; }
.trabalho { background: #e8f5e9; }
.falta { background: #ffebee; }
.weekend { background: #fff8e1; }

/* --- MODALS & OVERLAYS --- */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:10000; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:white; padding:30px; border-radius:15px; width:400px; }
#loadingOverlay { display:none; position:fixed; inset:0; background:rgba(13,27,62,0.8); z-index:99999; align-items:center; justify-content:center; flex-direction:column; color:white; }
#loadingOverlay.active { display:flex; }
#toastContainer { position:fixed; bottom:20px; right:20px; z-index:100000; }
.toast { padding:12px 20px; border-radius:8px; color:white; margin-bottom:10px; font-weight:600; }
.toast.success { background:var(--green); }
.toast.error { background:var(--red); }
</style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><div id="loadingMsg">A carregar...</div></div>
<div id="toastContainer"></div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">ANDA Ecossistema</div>
    <div class="login-field"><label>Utilizador</label><input type="text" id="loginUser"></div>
    <div class="login-field"><label>Senha</label><input type="password" id="loginPass"></div>
    <div class="login-error" id="loginError">❌ Credenciais inválidas</div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="appShell">
  <div class="topbar">
    <div class="topbar-title">ANDA Ecossistema</div>
    <div style="margin-left:auto; display:flex; gap:15px; align-items:center;">
      <span id="badgeNome">---</span>
      <button onclick="doLogout()" style="padding:5px 10px; cursor:pointer;">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="welcome-banner">
      <h2>Bem-vindo ao ANDA VIVA+</h2>
      <p>Gestão Integrada de Recursos Humanos e Finanças</p>
    </div>
    <div class="modules-grid">
      <div class="module-card" onclick="goTo('efectividade')">
        <h3>📊 Folha de Efectividade</h3>
        <p>Registo de presenças e faltas mensais.</p>
      </div>
      <div class="module-card coming-soon"><h3>💰 Salários</h3><p>Em breve...</p></div>
    </div>
  </div>
</div>

<div id="efectividadeShell" style="display:none; flex-direction:column; padding:20px;">
  <button onclick="goToDashboard()" style="width:150px; margin-bottom:20px;">← Voltar</button>
  <div id="controls" style="display:flex; gap:10px; margin-bottom:20px;">
    <select id="selMes" onchange="onMonthChange()"></select>
    <select id="selAno" onchange="onMonthChange()"></select>
    <button onclick="showAddColaborador()">+ Colaborador</button>
  </div>
  <div id="sheetContainer"></div>
</div>

<script>
// --- CONFIGURAÇÕES ---
const SUPA_URL = 'https://jsyhbvtkuppacjmoljur.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzeWhidnRrdXBwYWNqbW9sanVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjAwMjUsImV4cCI6MjA4OTgzNjAyNX0.T6krFPXGv76G2L1XinhOyNs_WQQIiwit7oRkKc39ocQ';

// --- ESTADO GLOBAL ---
let currentUser = null;
let colaboradores = [];
let attendance = {};
let efectInited = false;

// --- FUNÇÕES CORE ---
async function supaFetch(table, method, body, params = '') {
  const url = `${SUPA_URL}/rest/v1/${table}${params}`;
  const headers = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' };
  const opts = { method: method || 'GET', headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.ok ? await res.json() : null;
}

async function supaUpsert(table, data) {
  const url = `${SUPA_URL}/rest/v1/${table}`;
  const headers = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' };
  const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(data) });
  return res.ok;
}

// --- AUTENTICAÇÃO ---
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  showLoading('A verificar...');
  const users = await supaFetch('app_users', 'GET', null, `?username=eq.${u}&password=eq.${p}`);
  hideLoading();
  if (users && users.length > 0) {
    currentUser = users[0];
    sessionStorage.setItem('anda_user', JSON.stringify(currentUser));
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('badgeNome').textContent = currentUser.nome;
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('anda_user');
  location.reload();
}

// --- NAVEGAÇÃO ---
function goTo(module) {
  if (module === 'efectividade') {
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('efectividadeShell').style.display = 'flex';
    if (!efectInited) initEfectividade();
  }
}
function goToDashboard() {
  document.getElementById('efectividadeShell').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
}

// --- EFECTIVIDADE ---
async function initEfectividade() {
  efectInited = true;
  const now = new Date();
  // Popular selects de meses e anos
  const sm = document.getElementById('selMes');
  for(let i=1; i<=12; i++) sm.innerHTML += `<option value="${i}" ${i==now.getMonth()+1?'selected':''}>Mês ${i}</option>`;
  const sa = document.getElementById('selAno');
  for(let i=2024; i<=2026; i++) sa.innerHTML += `<option value="${i}" ${i==now.getFullYear()?'selected':''}>${i}</option>`;
  
  await loadData();
}

async function loadData() {
  showLoading('A carregar dados...');
  colaboradores = await supaFetch('colaboradores', 'GET', null, '?activo=eq.true');
  const mes = document.getElementById('selMes').value;
  const ano = document.getElementById('selAno').value;
  const pres = await supaFetch('presencas', 'GET', null, `?mes=eq.${mes}&ano=eq.${ano}`);
  
  attendance = {};
  pres.forEach(p => {
    if(!attendance[p.colaborador_id]) attendance[p.colaborador_id] = {};
    attendance[p.colaborador_id][p.dia] = { val: p.valor, just: p.justificada };
  });
  hideLoading();
  buildSheet();
}

function buildSheet() {
  const mes = document.getElementById('selMes').value;
  const ano = document.getElementById('selAno').value;
  const dias = new Date(ano, mes, 0).getDate();
  
  let html = `<table class="sheet"><tr><th>Colaborador</th>`;
  for(let d=1; d<=dias; d++) html += `<th>${d}</th>`;
  html += `</tr>`;
  
  colaboradores.forEach(c => {
    html += `<tr><td style="text-align:left">${c.nome}</td>`;
    for(let d=1; d<=dias; d++) {
      const val = (attendance[c.id] && attendance[c.id][d]) ? attendance[c.id][d].val : '';
      const cls = val === '1' ? 'trabalho' : (val ? 'falta' : '');
      html += `<td class="day-cell ${cls}" onclick="updateDay(${c.id}, ${d})">${val || '-'}</td>`;
    }
    html += `</tr>`;
  });
  html += `</table>`;
  document.getElementById('sheetContainer').innerHTML = html;
}

async function updateDay(colId, dia) {
  const current = (attendance[colId] && attendance[colId][dia]) ? attendance[colId][dia].val : '';
  const newVal = current === '1' ? 'F' : (current === 'F' ? '' : '1');
  
  const payload = {
    colaborador_id: colId, dia,
    mes: document.getElementById('selMes').value,
    ano: document.getElementById('selAno').value,
    valor: newVal, updated_at: new Date().toISOString()
  };
  
  if(await supaUpsert('presencas', payload)) {
    if(!attendance[colId]) attendance[colId] = {};
    attendance[colId][dia] = { val: newVal };
    buildSheet();
  }
}

// --- UTILITÁRIOS ---
function showLoading(msg) { document.getElementById('loadingOverlay').classList.add('active'); document.getElementById('loadingMsg').textContent = msg; }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
function showToast(msg, type) { 
  const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function onMonthChange() { loadData(); }

// Auto-login se existir sessão
window.onload = () => {
  const saved = sessionStorage.getItem('anda_user');
  if(saved) {
    currentUser = JSON.parse(saved);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('badgeNome').textContent = currentUser.nome;
  }
};
</script>
</body>
</html>
