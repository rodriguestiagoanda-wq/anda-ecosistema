// NOVO: Função para verificar se o usuário já está logado vindo do Dashboard
async function checkAuth() {
  const savedUser = localStorage.getItem('anda_user');
  if (!savedUser) {
    window.location.href = "index.html"; // Se não houver login, volta para o início
    return;
  }
  
  currentUser = JSON.parse(savedUser);
  
  // Preenche o Badge do usuário no topo
  document.getElementById('badgeNome').textContent = currentUser.nome;
  const roleLabel = {admin:'Administrador', gestor:'Gestor', viewer:'Visualizador'}[currentUser.role] || currentUser.role;
  const distLabel = currentUser.distrito ? ' · ' + currentUser.distrito.replace(/,/g,' | ') : '';
  document.getElementById('badgeRole').textContent = roleLabel + distLabel;

  // Mostra botões específicos se for Admin
  if (currentUser.role === 'admin') {
    document.getElementById('btnAudit').style.display = '';
    document.getElementById('btnUsers').style.display = '';
    document.getElementById('btnArchive').style.display = '';
  }

  // Carrega os dados
  showLoadingOverlay('A carregar dados...');
  await loadColaboradores();
  await loadAttendance();
  hideLoadingOverlay();
  buildSheet();
}

// ALTERADO: loadColaboradores agora respeita a regra de Admin ver tudo
async function loadColaboradores() {
  // AJUSTE: Se for admin, remove o filtro de 'activo' para trazer os 74
  const filtroStatus = (currentUser && currentUser.role === 'admin') ? '' : 'activo=eq.true&';
  
  const rows = await supaFetch('colaboradores', 'GET', null, '?' + filtroStatus + 'order=id.asc');
  
  if (rows && rows.length > 0) {
    colaboradores.length = 0;
    rows.forEach(function(r) {
      colaboradores.push({ 
        id: r.id, 
        nome: r.nome, 
        cargo: r.cargo, 
        tipo: r.tipo, 
        distrito: r.distrito,
        activo: r.activo // Guardamos o status para uso visual
      });
    });
    nextId = Math.max.apply(null, colaboradores.map(function(c){ return c.id; })) + 1;
  }
}
